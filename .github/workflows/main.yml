name: DATAE Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas openpyxl

      - name: Run pipeline
        run: |
          python main.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: DATAE_OUTPUTS
          path: output/
