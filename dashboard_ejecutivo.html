<style>
:root{--primary:#0047AB;--secondary:#6c757d;--accent:#ffc107;--bg:#f8f9fa;--card:#fff;--text:#1f2937;--border:#dbe2ea;--shadow:0 6px 18px rgba(2,6,23,.08)}
[data-theme="dark"]{--bg:#0f172a;--card:#111827;--text:#e5e7eb;--border:#374151;--secondary:#9ca3af;--shadow:0 8px 24px rgba(0,0,0,.45)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.brand{font-weight:700;color:var(--primary)} .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab-btn{border:1px solid var(--border);background:transparent;padding:8px 10px;border-radius:8px;cursor:pointer}.tab-btn.active{background:var(--primary);color:#fff}
.page{max-width:1280px;margin:0 auto;padding:20px}.filters,.grid{display:grid;gap:15px}.filters{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:17px;box-shadow:var(--shadow)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:15px}.kpi .v{font-size:1.3rem;font-weight:700;color:var(--primary)}
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:15px} @media (max-width:980px){.grid-2{grid-template-columns:1fr}}
.hidden{display:none}.chip{padding:4px 9px;background:var(--accent);border-radius:999px;font-size:.77rem}
.table-wrap{overflow:auto;max-height:calc(100vh - 260px);border:1px solid var(--border);border-radius:10px;background:var(--card)}
.plot{width:100%;height:340px}#top15{height:450px}#hist{height:320px}
input,select,button{padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text)}
</style>
</head>

function renderCharts(rows){const agg=campusAgg(rows),types=['Apoyo_Academico_CIAC','Talleres','Mentorias','Atenciones_Individuales'];Plotly.newPlot('stacked',['SAN_JOAQUIN','VITACURA'].map(c=>({type:'bar',orientation:'h',name:c.replace('_',' '),y:types.map(t=>t.replaceAll('_',' ')),x:types.map(t=>agg[c].sum[t])})),{barmode:'stack',paper_bgcolor:'transparent',plot_bgcolor:'transparent',margin:{l:120,r:20,t:20,b:40}}, {displayModeBar:false,responsive:true});const campusCounts=['SAN_JOAQUIN','VITACURA','SIN_CAMPUS'].map(c=>agg[c].students.size);const withSupport=rows.filter(r=>r.total>0).length,without=rows.length-withSupport;Plotly.newPlot('donut',[{type:'pie',labels:['San Joaquín','Vitacura','Sin campus'],values:campusCounts,hole:.55,domain:{x:[0,1],y:[0,1]}},{type:'pie',labels:['Con apoyo','Sin apoyo'],values:[withSupport,without],hole:.75,textposition:'inside',domain:{x:[.25,.75],y:[.25,.75]},showlegend:false}],{paper_bgcolor:'transparent',margin:{t:20,b:20,l:20,r:20}}, {displayModeBar:false,responsive:true});}
function renderTab2(rows){const ranked=[...rows].sort((a,b)=>b.total-a.total).slice(0,15).reverse();tab1.innerHTML=`<div class='card'><div id='top15'></div></div><div class='grid-2'><div class='card'><div id='hist'></div></div><div class='card'><input id='qTable' placeholder='Buscar...'><div class='table-wrap'><div id='tableCampus'></div></div></div></div>`;Plotly.newPlot('top15',[{type:'bar',orientation:'h',y:ranked.map(r=>r.nombre||r.rut_norm),x:ranked.map(r=>r.total),text:ranked.map(r=>`${r.nombre} — ${r.rut_norm}<br>CIAC ${r.Apoyo_Academico_CIAC}, Talleres ${r.Talleres}, Mentorías ${r.Mentorias}, Atenciones ${r.Atenciones_Individuales}, Total ${r.total}`),hoverinfo:'text'}],{paper_bgcolor:'transparent',margin:{l:200,r:30,t:20,b:30}}, {displayModeBar:false,responsive:true});Plotly.newPlot('hist',[{type:'histogram',x:rows.map(r=>r.total)}],{paper_bgcolor:'transparent',margin:{t:20}}, {displayModeBar:false,responsive:true});analysisTable=new Tabulator('#tableCampus',{data:rows,layout:'fitDataStretch',columns:[{title:'rut_norm',field:'rut_norm'},{title:'nombre_preferido',field:'nombre'},{title:'campus',field:'campus'},{title:'CIAC',field:'Apoyo_Academico_CIAC'},{title:'Talleres',field:'Talleres'},{title:'Mentorías',field:'Mentorias'},{title:'Atenciones',field:'Atenciones_Individuales'},{title:'Total',field:'total'},{title:'rut_status',field:'rut_status'}]});qTable.oninput=e=>analysisTable.setFilter([[{field:'nombre',type:'like',value:e.target.value},{field:'rut_norm',type:'like',value:e.target.value}]]);} 
function renderTab3(rows){const sin=rows.filter(r=>r.campus==='SIN_CAMPUS').map(r=>({...r,apoyos_detectados:['Apoyo_Academico_CIAC','Talleres','Mentorias','Atenciones_Individuales'].filter(k=>r[k]>0).map(v=>v.replaceAll('_',' ')).join(', ')}));tab2.innerHTML=`<div class='card'><div id='sinCampusBars' class='plot'></div></div><div class='card'><button id='expSin'>Exportar CSV</button><div class='table-wrap'><div id='tableSinCampus'></div></div></div>`;const counts={CIAC:sin.filter(r=>r.Apoyo_Academico_CIAC>0).length,Talleres:sin.filter(r=>r.Talleres>0).length,Mentorías:sin.filter(r=>r.Mentorias>0).length,Atenciones:sin.filter(r=>r.Atenciones_Individuales>0).length};Plotly.newPlot('sinCampusBars',[{type:'bar',x:Object.keys(counts),y:Object.values(counts),marker:{color:'#0047AB'}}],{paper_bgcolor:'transparent',margin:{t:20}},{displayModeBar:false,responsive:true});sinCampusTable=new Tabulator('#tableSinCampus',{data:sin,layout:'fitDataStretch',columns:[{title:'RUT',field:'rut_norm'},{title:'Nombre',field:'nombre'},{title:'CIAC',field:'Apoyo_Academico_CIAC'},{title:'Talleres',field:'Talleres'},{title:'Mentorías',field:'Mentorias'},{title:'Atenciones',field:'Atenciones_Individuales'},{title:'Apoyos detectados',field:'apoyos_detectados'},{title:'rut_status',field:'rut_status'}]});expSin.onclick=()=>downloadCsv('rut_sin_campus.csv',sin);} 
function renderTab4(rows){const calidad=RAW_DATA.reporte_calidad;const tipoCount={};calidad.forEach(r=>tipoCount[r.tipo||'SIN_TIPO']=(tipoCount[r.tipo||'SIN_TIPO']||0)+1);const base=RAW_DATA.san_joaquin.length+RAW_DATA.vitacura.length+RAW_DATA.rut_sin_campus.length;const problemas=calidad.length+RAW_DATA.rut_invalido_cuarentena.length+rows.filter(r=>r.rut_status==='CUARENTENA').length;tab3.innerHTML=`<div class='grid-2'><div class='card'><div id='calidadTipo' class='plot'></div></div><div class='card'><div id='calidadPie' class='plot'></div></div></div><div class='card'><h4>Recomendaciones automáticas</h4><ul><li>Se detectaron ${rows.filter(r=>!r.rut_valid).length} registros con RUT inválido.</li><li>Se detectaron ${STUDENT_DIM.filter(s=>s.nombres_detectados.size>1).length} casos de nombres distintos para un mismo RUT.</li></ul></div><div class='card table-wrap'><div id='tableCalidad'></div></div>`;Plotly.newPlot('calidadTipo',[{type:'bar',x:Object.keys(tipoCount),y:Object.values(tipoCount)}],{paper_bgcolor:'transparent',margin:{t:20}}, {displayModeBar:false,responsive:true});Plotly.newPlot('calidadPie',[{type:'pie',labels:['Problemas','Limpios'],values:[problemas,Math.max(base-problemas,0)],hole:.5}],{paper_bgcolor:'transparent',margin:{t:20}}, {displayModeBar:false,responsive:true});calidadTable=new Tabulator('#tableCalidad',{data:calidad.slice(0,30),layout:'fitDataStretch',columns:['tipo','metrica','valor','detalle','rut','nombre_padron','nombre_fuente','fuente','tipo_diferencia'].map(f=>({title:f,field:f}))});}
function renderTab5(rows){tab4.innerHTML=`<div class='card'><input id='studentSearch' placeholder='Buscar rut o nombre'><div id='autocomplete'></div></div><div class='grid-2'><div class='card' id='studentCard'>Seleccione estudiante</div><div class='card'><div id='studentBars' class='plot'></div></div></div><div class='card table-wrap'><div id='tableTrace'></div></div>`;const dim=STUDENT_DIM;studentSearch.oninput=e=>{const q=e.target.value.toLowerCase();const m=dim.filter(s=>s.student_key.toLowerCase().includes(q)||s.nombre_preferido.toLowerCase().includes(q)).slice(0,10);autocomplete.innerHTML=m.map(s=>`<button data-id='${s.student_key}'>${s.nombre_preferido} · ${s.student_key}</button>`).join('');autocomplete.querySelectorAll('button').forEach(b=>b.onclick=()=>pick(b.dataset.id));};function pick(id){const s=dim.find(d=>d.student_key===id);if(!s) return;const rowsS=s.rows;studentCard.innerHTML=`<b>${s.nombre_preferido}</b><br>${s.student_key}<br>Campus: ${[...s.campus_detectados].join(', ')}<br>rut_status: VALIDO`;const tot=['Apoyo_Academico_CIAC','Talleres','Mentorias','Atenciones_Individuales'].map(k=>rowsS.reduce((a,b)=>a+b[k],0));Plotly.newPlot('studentBars',[{type:'bar',x:['CIAC','Talleres','Mentorías','Atenciones'],y:tot,marker:{color:'#0047AB'}}],{paper_bgcolor:'transparent',margin:{t:20}}, {displayModeBar:false,responsive:true});traceTable=new Tabulator('#tableTrace',{data:rowsS,layout:'fitDataStretch',columns:[{title:'hoja',field:'campus'},{title:'nombre original',field:'nombre'},{title:'fuentes',field:'fuentes'},{title:'rut_status',field:'rut_status'}]});}}
function renderValidacion(rows){const declared=RAW_DATA.resumen_general;const agg=campusAgg(rows);const invalid=rows.filter(r=>!r.rut_valid).length;validacion.innerHTML=`<p>Totales declarados (RESUMEN_GENERAL): ${JSON.stringify(declared)}</p><p>Totales calculados (sumas/cobertura): ${JSON.stringify(agg)}</p><p># RUT inválidos detectados: ${invalid}</p><p># registros en RUT_SIN_CAMPUS: ${RAW_DATA.rut_sin_campus.length}</p><p>Generado el: ${RAW_DATA.generatedAt}</p>`;}
function downloadCsv(name,rows){if(!rows?.length)return;const keys=Object.keys(rows[0]);const csv=[keys.join(',')].concat(rows.map(r=>keys.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=name;a.click();}
function renderAll(){const rows=applyGlobalFilters();renderKpis(rows);renderCharts(rows);renderTab2(rows);renderTab3(rows);renderTab4(rows);renderTab5(rows);renderValidacion(rows);}
function initTabs(){tabs.innerHTML=TABS.map((t,i)=>`<button class='tab-btn ${i===0?'active':''}' data-t='${i}'>${t}</button>`).join('');tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{activeTab=+b.dataset.t;document.querySelectorAll('.tabpane').forEach((p,i)=>p.classList.toggle('hidden',i!==activeTab));tabs.querySelectorAll('button').forEach((x,i)=>x.classList.toggle('active',i===activeTab));});}
[fCampus,fTipo,fMin,fConApoyo].forEach(el=>el.oninput=()=>{fMinVal.textContent=fMin.value;renderAll();});
darkToggle.onclick=()=>{const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);};
if(localStorage.getItem('theme'))document.documentElement.setAttribute('data-theme',localStorage.getItem('theme'));
downloadCtx.onclick=()=>{if(activeTab===2&&sinCampusTable)downloadCsv('rut_sin_campus.csv',sinCampusTable.getData());else if(activeTab===1&&analysisTable)downloadCsv('analisis_campus.csv',analysisTable.getData());};
initTabs();renderAll();
</script>
</body></html>
